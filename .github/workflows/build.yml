name: build

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  VCHORD_VERSION: '1.1.1'
  IMAGE: ghcr.io/jdijt/cnpg-vchord

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # vchord >= 1.1.1 ships debs for PG 14-18 (no 13).
        pg_major: [14, 15, 16, 17, 18]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Unique, immutable per-build suffix so rebuilds never move an existing tag.
      - id: meta
        run: echo "ts=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            PG_MAJOR=${{ matrix.pg_major }}
            VCHORD_VERSION=${{ env.VCHORD_VERSION }}
          tags: ${{ env.IMAGE }}:${{ env.VCHORD_VERSION }}-${{ steps.meta.outputs.ts }}-${{ matrix.pg_major }}-trixie

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
